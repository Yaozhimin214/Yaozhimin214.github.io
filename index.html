<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线修图 · 无痕改字 · PDF 修改工具</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
      min-height: 100vh;
    }
    .container { max-width: 960px; margin: 0 auto; padding: 0 20px; }
    .banner {
      text-align: center;
      padding: 40px 0 20px;
    }
    .banner img {
      max-width: 100%;
      height: auto;
      border-radius: 12px;
    }
    header {
      text-align: center;
      padding: 40px 0 40px;
    }
    header h1 {
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }
    header p {
      font-size: 1.2rem;
      color: #94a3b8;
      max-width: 600px;
      margin: 0 auto;
    }
    .tools {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      padding: 40px 0 60px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 32px;
      transition: transform 0.2s, border-color 0.2s;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: #38bdf8;
    }
    .card .icon { font-size: 2.5rem; margin-bottom: 16px; }
    .card h3 { font-size: 1.3rem; margin-bottom: 10px; color: #f1f5f9; }
    .card p { color: #94a3b8; font-size: 0.95rem; line-height: 1.6; }
    .contact {
      text-align: center;
      padding: 20px 0 60px;
    }
    .contact h2 {
      font-size: 1.5rem;
      color: #f1f5f9;
      margin-bottom: 24px;
    }
    .contact .qr {
      max-width: 220px;
      border-radius: 12px;
      margin-bottom: 24px;
      border: 2px solid rgba(255,255,255,0.15);
    }
    .contact .email {
      color: #94a3b8;
      margin-bottom: 8px;
    }
    .contact .email-addr {
      font-size: 1.2rem;
      color: #38bdf8;
      font-weight: 600;
    }
    footer {
      text-align: center;
      padding: 40px 0;
      color: #475569;
      font-size: 0.85rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 公司名片 -->
    <div class="banner">
      <img src="images/moyanshe_banner.png" alt="墨颜社 · 专业修图">
    </div>

    <header>

    </header>

    <div class="tools">
      <div class="card">
        <div class="icon">🖼️</div>
        <h3>在线 P 图修图</h3>
        <p>专业级图片美化、人像精修、背景替换，无需安装任何软件，浏览器即可完成</p>
      </div>
      <div class="card">
        <div class="icon">✏️</div>
        <h3>无痕改字</h3>
        <p>图片文字智能识别与替换，字体匹配、颜色融合，修改后看不出痕迹</p>
      </div>
      <div class="card">
        <div class="icon">📄</div>
        <h3>PDF 文件修改</h3>
        <p>PDF 内容编辑、文字修改、格式转换，保持原始排版不变</p>
      </div>
    </div>

    <!-- 联系方式 -->
    <div class="contact">
      <h2>📬 联系我们</h2>
      <img class="qr" src="images/qywx_qr.png" alt="企业微信二维码">
      <p class="email">📧 邮箱：<span class="email-addr">yishengguiyan@outlook.com</span></p>
    </div>

    <footer>
      &copy; 2026 在线修图工具 · Powered by GitHub Pages
    </footer>
  </div>
</body>
</html>
